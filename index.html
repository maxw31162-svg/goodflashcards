const storageKey="psych105-combined-v2";
let currentIndex=0,currentDeck="All",currentCategory="All",filteredCards=[],shuffleMode=false,missedOnly=false;
const mastery=JSON.parse(localStorage.getItem(storageKey+"-mastery")||"{}");

function buildDeckFilter(){
  const decks=["All",...new Set(flashcards.map(c=>c.deck))];
  const bar=document.getElementById("deckBar");
  bar.innerHTML="";
  decks.forEach(d=>{
    const btn=document.createElement("button");
    btn.className="chip deck-chip"+(d===currentDeck?" active":"");
    btn.textContent=d;
    btn.onclick=()=>{currentDeck=d;currentCategory="All";currentIndex=0;buildDeckFilter();buildCategoryFilter();applyFilters();};
    bar.appendChild(btn);
  });
}

function buildCategoryFilter(){
  const src=currentDeck==="All"?flashcards:flashcards.filter(c=>c.deck===currentDeck);
  const cats=["All",...new Set(src.map(c=>c.category))];
  const bar=document.getElementById("filterBar");
  bar.innerHTML="";
  cats.forEach(cat=>{
    const btn=document.createElement("button");
    btn.className="chip"+(cat===currentCategory?" active":"");
    btn.textContent=cat;
    btn.onclick=()=>{currentCategory=cat;currentIndex=0;buildCategoryFilter();applyFilters();};
    bar.appendChild(btn);
  });
}

function applyFilters(){
  filteredCards=flashcards.filter((card,index)=>{
    const dk=currentDeck==="All"||card.deck===currentDeck;
    const ct=currentCategory==="All"||card.category===currentCategory;
    const ms=!missedOnly||mastery[index]==="wrong";
    return dk&&ct&&ms;
  });
  if(shuffleMode)filteredCards=[...filteredCards].sort(()=>Math.random()-0.5);
  if(currentIndex>=filteredCards.length)currentIndex=0;
  document.getElementById("subhead").textContent=
    (currentDeck==="All"?"All Decks":currentDeck)+
    (currentCategory!=="All"?" · "+currentCategory:"")+
    " · "+filteredCards.length+" cards";
  renderCard();renderList();
}

function getOriginalIndex(card){return flashcards.findIndex(item=>item.q===card.q&&item.deck===card.deck);}

function renderCard(){
  document.getElementById("card").classList.remove("flipped");
  if(!filteredCards.length){
    document.getElementById("cardDeck").textContent="";
    document.getElementById("cardCategory").textContent="No Cards";
    document.getElementById("cardQuestion").textContent="No cards match this filter.";
    document.getElementById("cardAnswer").innerHTML="Try adjusting your filters.";
    document.getElementById("cardCounter").textContent="0 / 0";
    document.getElementById("progressLabel").textContent="No cards";
    document.getElementById("progressFill").style.width="0%";
    document.getElementById("masteryLabel").textContent=masteredCount()+" mastered";
    document.getElementById("masteryDot").className="mastery-dot";
    return;
  }
  const card=filteredCards[currentIndex];
  const oi=getOriginalIndex(card);
  const status=mastery[oi]||"";
  document.getElementById("cardDeck").textContent=card.deck;
  document.getElementById("cardCategory").textContent=card.category;
  document.getElementById("cardQuestion").textContent=card.q;
  document.getElementById("cardAnswer").innerHTML=card.a;
  document.getElementById("cardCounter").textContent=`${currentIndex+1} / ${filteredCards.length}`;
  document.getElementById("progressLabel").textContent=`Card ${currentIndex+1} of ${filteredCards.length}`;
  document.getElementById("progressFill").style.width=`${((currentIndex+1)/filteredCards.length)*100}%`;
  document.getElementById("masteryLabel").textContent=`${masteredCount()} mastered`;
  document.getElementById("masteryDot").className="mastery-dot"+(status?` ${status}`:"");
}

function renderList(){
  const list=document.getElementById("list-view");
  list.innerHTML="";
  filteredCards.forEach((card,index)=>{
    const oi=getOriginalIndex(card);
    const status=mastery[oi];
    const item=document.createElement("div");
    item.className="list-card";
    item.onclick=()=>{currentIndex=index;showFlashcards();renderCard();};
    const dot=status?` <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${status==="good"?"var(--good)":status==="hard"?"var(--hard)":"var(--wrong)"};"></span>`:"";
    item.innerHTML=`<div class="list-deck">${card.deck}</div><div class="list-category">${card.category}</div><div class="list-question">${card.q}${dot}</div>`;
    list.appendChild(item);
  });
}

function flipCard(){document.getElementById("card").classList.toggle("flipped");}
function nextCard(){if(!filteredCards.length)return;currentIndex=(currentIndex+1)%filteredCards.length;renderCard();}
function prevCard(){if(!filteredCards.length)return;currentIndex=(currentIndex-1+filteredCards.length)%filteredCards.length;renderCard();}

function markMastery(level){
  if(!filteredCards.length)return;
  const oi=getOriginalIndex(filteredCards[currentIndex]);
  mastery[oi]=level;
  localStorage.setItem(storageKey+"-mastery",JSON.stringify(mastery));
  renderCard();renderList();
}

function masteredCount(){return Object.values(mastery).filter(v=>v==="good").length;}

function toggleShuffle(){shuffleMode=!shuffleMode;document.getElementById("shuffleBtn").classList.toggle("active",shuffleMode);currentIndex=0;applyFilters();}
function toggleMissed(){missedOnly=!missedOnly;document.getElementById("missedBtn").classList.toggle("active",missedOnly);currentIndex=0;applyFilters();}

function showFlashcards(){
  document.getElementById("flashcard-view").classList.add("active");
  document.getElementById("list-view").classList.remove("active");
  document.getElementById("flashTab").classList.add("active");
  document.getElementById("listTab").classList.remove("active");
}
function showList(){
  document.getElementById("list-view").classList.add("active");
  document.getElementById("flashcard-view").classList.remove("active");
  document.getElementById("listTab").classList.add("active");
  document.getElementById("flashTab").classList.remove("active");
}

document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowRight")nextCard();
  if(e.key==="ArrowLeft")prevCard();
  if(e.key===" "){e.preventDefault();flipCard();}
});

buildDeckFilter();buildCategoryFilter();applyFilters();
</script>
</body>
</html>
