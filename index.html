<style>
  :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#2d8f85;--accent2:#6ec5bc;--accent3:#d8fff8;--card-front:#162427;--card-back:#11282b;--wrong:#f85149;--hard:#f0883e;--good:#3fb950;--radius:18px;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:radial-gradient(circle at top left,rgba(110,197,188,0.12),transparent 30%),radial-gradient(circle at top right,rgba(45,143,133,0.16),transparent 32%),linear-gradient(180deg,#0d1117 0%,#0b1318 100%);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
  header{position:sticky;top:0;z-index:50;padding:14px 14px 10px;background:rgba(22,27,34,0.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);}
  .header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;}
  h1{font-family:Georgia,"Times New Roman",serif;font-size:1.02rem;color:var(--accent3);line-height:1.2;}
  .subhead{font-size:0.7rem;color:var(--muted);margin-top:3px;}
  .header-btns{display:flex;gap:6px;flex-shrink:0;}
  .btn{background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:7px 10px;font-size:0.72rem;cursor:pointer;transition:all 0.2s ease;font-family:inherit;}
  .btn:hover,.btn.active{color:var(--text);border-color:var(--accent2);}
  .btn.active{background:rgba(45,143,133,0.22);}
  .filter-section{display:flex;flex-direction:column;gap:5px;}
  .filter-bar{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;align-items:center;}
  .filter-bar::-webkit-scrollbar{display:none;}
  .chip{flex-shrink:0;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.66rem;padding:5px 10px;cursor:pointer;transition:all 0.2s ease;font-family:inherit;}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .chip.deck-chip.active{background:#243450;border-color:#4a6fa5;color:#a8c4f0;}
  .progress-wrap{padding:9px 14px 7px;background:rgba(22,27,34,0.94);border-bottom:1px solid var(--border);}
  .progress-info{display:flex;justify-content:space-between;font-size:0.68rem;color:var(--muted);margin-bottom:5px;}
  .progress-bar{height:4px;background:var(--surface2);border-radius:999px;overflow:hidden;}
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.25s ease;}
  main{flex:1;display:flex;flex-direction:column;}
  .view{display:none;flex:1;}
  .view.active{display:flex;}
  #flashcard-view{flex-direction:column;align-items:center;justify-content:flex-start;padding:16px 14px 88px;}
  .scene{width:100%;max-width:520px;perspective:1200px;cursor:pointer;margin-bottom:14px;}
  .card{width:100%;min-height:320px;position:relative;transform-style:preserve-3d;transition:transform 0.55s cubic-bezier(.4,.2,.2,1);border-radius:var(--radius);}
  .card.flipped{transform:rotateY(180deg);}
  .card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--radius);border:1px solid var(--border);padding:22px 20px;display:flex;flex-direction:column;justify-content:center;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.22);}
  .card-front{background:linear-gradient(140deg,rgba(110,197,188,0.06),transparent 42%),var(--card-front);}
  .card-back{background:linear-gradient(140deg,rgba(110,197,188,0.08),transparent 42%),var(--card-back);transform:rotateY(180deg);border-color:rgba(110,197,188,0.5);}
  .label{align-self:center;font-size:0.58rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent2);background:rgba(110,197,188,0.12);border-radius:999px;padding:4px 10px;margin-bottom:10px;}
  .deck-badge{font-size:0.6rem;color:#4a6fa5;letter-spacing:0.06em;margin-bottom:3px;}
  .category{font-size:0.66rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .question{font-family:Georgia,"Times New Roman",serif;font-size:1.06rem;line-height:1.48;}
  .answer{font-size:0.88rem;line-height:1.62;text-align:left;}
  .answer strong{color:var(--accent3);}
  .answer em{color:var(--accent2);font-style:normal;}
  .hint{margin-top:14px;font-size:0.6rem;color:var(--muted);opacity:0.85;}
  .mastery-dot{width:8px;height:8px;border-radius:50%;margin:10px auto 0;display:none;}
  .mastery-dot.wrong,.mastery-dot.hard,.mastery-dot.good{display:block;}
  .mastery-dot.wrong{background:var(--wrong);}
  .mastery-dot.hard{background:var(--hard);}
  .mastery-dot.good{background:var(--good);}
  .card-nav,.mastery-row{width:100%;max-width:520px;display:flex;gap:8px;margin-bottom:10px;}
  .nav-btn,.mastery-btn{flex:1;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);padding:10px 12px;cursor:pointer;font-size:0.8rem;transition:all 0.2s ease;font-family:inherit;}
  .nav-btn:hover,.mastery-btn:hover{transform:translateY(-1px);border-color:var(--accent2);}
  .counter{min-width:88px;text-align:center;font-size:0.76rem;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .mastery-btn.wrong{background:rgba(248,81,73,0.1);color:var(--wrong);border-color:rgba(248,81,73,0.28);}
  .mastery-btn.hard{background:rgba(240,136,62,0.1);color:var(--hard);border-color:rgba(240,136,62,0.28);}
  .mastery-btn.good{background:rgba(63,185,80,0.1);color:var(--good);border-color:rgba(63,185,80,0.28);}
  #list-view{flex-direction:column;gap:8px;padding:14px 12px 88px;overflow-y:auto;}
  .list-card{background:rgba(22,27,34,0.92);border:1px solid var(--border);border-radius:14px;padding:12px 13px;cursor:pointer;transition:all 0.2s ease;}
  .list-card:hover{border-color:var(--accent2);}
  .list-deck{font-size:0.58rem;color:#4a6fa5;letter-spacing:0.06em;margin-bottom:2px;}
  .list-category{font-size:0.62rem;color:var(--accent2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;}
  .list-question{font-size:0.84rem;line-height:1.45;}
  .bottom-nav{position:sticky;bottom:0;display:flex;background:rgba(22,27,34,0.96);backdrop-filter:blur(10px);border-top:1px solid var(--border);}
  .tab{flex:1;text-align:center;color:var(--muted);padding:10px 6px 8px;font-size:0.66rem;cursor:pointer;transition:all 0.2s ease;border-top:2px solid transparent;}
  .tab.active{color:var(--accent2);border-top-color:var(--accent2);}
  @media(max-width:560px){.question{font-size:1rem;}.answer{font-size:0.84rem;}.card{min-height:350px;}}
</style>
