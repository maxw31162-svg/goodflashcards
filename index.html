<script>
const flashcards=[
// MAR 12 · PERSONALITY
{deck:"Mar 12 · Personality",category:"Foundations",q:"What is personality, and what major influences do the main personality approaches disagree about?",a:"<strong>Personality</strong> is a person's <strong>unique, fairly consistent pattern of feeling, behaving, and thinking</strong>.<br><br>Main approaches differ in how much they emphasize:<br><strong>Cognitive processes</strong><br><strong>Subjective experience</strong><br><strong>Biological factors</strong><br><strong>Unconscious motivation</strong><br><strong>Learning</strong><br><br><em>Simple example:</em> Two people may both be shy, but one theory explains it by traits, another by childhood conflict, and another by learned behavior."},
{deck:"Mar 12 · Personality",category:"Psychoanalytic",q:"What is the psychoanalytic view of personality, and what are the id, ego, and superego?",a:"Freud said personality comes from an ongoing <strong>battle among three structures</strong>:<br><strong>Id</strong>: inborn biological drives; follows the <strong>pleasure principle</strong><br><strong>Ego</strong>: expresses drives in socially acceptable ways; follows the <strong>reality principle</strong><br><strong>Superego</strong>: <strong>moral guide</strong><br><br><em>Simple example:</em> The id says, \"I want it now,\" the superego says, \"That's wrong,\" and the ego tries to find a realistic compromise."},
{deck:"Mar 12 · Personality",category:"Psychoanalytic",q:"What are defense mechanisms, and how do regression, rationalization, and displacement work?",a:"<strong>Defense mechanisms</strong> are <strong>distortions of reality</strong> that help people escape anxiety.<br><br><strong>Regression</strong>: returning to immature behavior that used to reduce anxiety<br><strong>Rationalization</strong>: giving socially acceptable reasons for inappropriate behavior<br><strong>Displacement</strong>: redirecting feelings from a threatening target to a safer one"},
{deck:"Mar 12 · Personality",category:"Psychoanalytic",q:"How do projection, reaction formation, and sublimation work as defense mechanisms?",a:"<strong>Projection</strong>: attributing your own undesirable feelings to someone else<br><strong>Reaction formation</strong>: acting opposite to what you really feel<br><strong>Sublimation</strong>: channeling sexual or aggressive impulses into socially acceptable outlets"},
{deck:"Mar 12 · Personality",category:"Neo-Freudian",q:"What did Adler emphasize in individual psychology?",a:"Adler developed <strong>Individual Psychology</strong>.<br><strong>Inferiority complex</strong>: feelings of inferiority motivate people to <strong>strive for superiority</strong>.<br><strong>Social interest</strong>: the healthiest version of that striving, where a person improves self and helps others too."},
{deck:"Mar 12 · Personality",category:"Neo-Freudian",q:"What did Jung mean by the personal unconscious, collective unconscious, and archetypes?",a:"<strong>Personal unconscious</strong>: your own unconscious mind containing <strong>repressed memories</strong><br><strong>Collective unconscious</strong>: an unconscious level <strong>shared by everyone</strong>, containing inherited symbolic material<br><strong>Archetypes</strong>: universal images representing key aspects of human experience; they shape <strong>dreams, art, and religious symbols</strong><br>Jung also distinguished <strong>introverts</strong> from <strong>extraverts</strong>."},
{deck:"Mar 12 · Personality",category:"Neo-Freudian",q:"What did Horney argue about culture, basic anxiety, basic hostility, and coping styles?",a:"Horney thought Freud ignored <strong>cultural and social factors</strong> and that psychoanalytic theory was <strong>androcentric</strong>.<br><br><strong>Basic anxiety</strong>: children's insecurity because they depend emotionally and physically on adults<br><strong>Basic hostility</strong>: anger toward parents that children suppress so they can still receive love<br><br>Coping styles: <strong>Moving toward others</strong>, <strong>Moving against others</strong>, <strong>Moving away from others</strong>"},
{deck:"Mar 12 · Personality",category:"Assessment",q:"What is the basic idea behind psychoanalytic assessment of personality?",a:"Psychoanalytic assessment uses <strong>projective tests</strong>, which assume people project hidden motives, conflicts, and feelings onto <strong>ambiguous stimuli</strong>.<br><br>Main examples: the <strong>Rorschach Test</strong> and the <strong>Thematic Apperception Test (TAT)</strong>."},
{deck:"Mar 12 · Personality",category:"Assessment",q:"What is the Rorschach Test?",a:"In the <strong>Rorschach Test</strong>, people report what they see in <strong>inkblots</strong>.<br>It contains <strong>10 bilaterally symmetrical inkblots</strong> and was developed by Swiss psychiatrist <strong>Hermann Rorschach</strong>."},
{deck:"Mar 12 · Personality",category:"Assessment",q:"What is the Thematic Apperception Test (TAT)?",a:"The <strong>TAT</strong> was created by <strong>Henry Murray</strong> and <strong>Christiana Morgan</strong>.<br>It includes <strong>19 black-and-white cards</strong> showing people in <strong>ambiguous situations</strong> plus <strong>1 blank card</strong>.<br>Participants tell stories about the 19 pictured cards and create their own story for the blank card."},
{deck:"Mar 12 · Personality",category:"Evaluation",q:"How did the slides evaluate the psychoanalytic approach?",a:"There is <strong>limited evidence</strong> for many psychoanalytic concepts.<br><br>Still, the approach highlighted that:<br><strong>Much behavior is driven by motives outside awareness</strong><br><strong>Childhood experiences are very important for later development</strong>"},
{deck:"Mar 12 · Personality",category:"Traits",q:"What is a trait, and how did Allport divide traits into three types?",a:"A <strong>trait</strong> is a <strong>fairly enduring personality characteristic</strong> inferred from behavior; traits are expected to be <strong>cross-situationally consistent</strong>.<br><br>Allport's three types:<br><strong>Cardinal traits</strong>: shape nearly every part of life<br><strong>Central traits</strong>: influence many parts of life<br><strong>Secondary traits</strong>: appear in more limited situations"},
{deck:"Mar 12 · Personality",category:"Traits",q:"What is Eysenck's three-factor theory?",a:"Eysenck used <strong>factor analysis</strong> to identify three major personality dimensions:<br><strong>Neuroticism</strong><br><strong>Psychoticism</strong><br><strong>Extraversion</strong><br><br>The slides note evidence that these dimensions have a <strong>genetic basis</strong>."},
{deck:"Mar 12 · Personality",category:"Traits",q:"What is the Five-Factor Model, and what do the Big Five predict?",a:"The <strong>Five-Factor Model</strong> organizes personality around the <strong>Big Five</strong>:<br><strong>Openness to experience</strong><br><strong>Conscientiousness</strong><br><strong>Extraversion</strong><br><strong>Agreeableness</strong><br><strong>Neuroticism</strong><br><br>These predict outcomes such as <strong>procrastination</strong>, <strong>eating disorders</strong>, and <strong>marital adjustment</strong>."},
{deck:"Mar 12 · Personality",category:"Assessment",q:"What does the MBTI do, and what did the slides emphasize about it?",a:"The <strong>MBTI</strong> presents <strong>pairs of statements</strong> and has people choose which is closer to describing them.<br>The slides say it has <strong>satisfactory validity</strong> and is used in <strong>a variety of research studies</strong>."},
{deck:"Mar 12 · Personality",category:"Assessment",q:"What is the MMPI, and what details were emphasized on the slide?",a:"<strong>MMPI</strong> = <strong>Minnesota Multiphasic Personality Inventory</strong>.<br>Developed at the <strong>University of Minnesota</strong> by <strong>Hathaway and McKinley</strong>.<br>Purpose: diagnose <strong>psychological disorders</strong>.<br>Uses <strong>empirical criterion-keying</strong>. Includes <strong>10 clinical scales</strong>. Also used to assess <strong>job applicants</strong>."},
{deck:"Mar 12 · Personality",category:"Evaluation",q:"How did the slides evaluate the dispositional approach?",a:"Good at <strong>describing</strong> personality differences but <strong>less effective at explaining</strong> why they exist.<br><br>Research supports:<br><strong>Universality of the Five-Factor Model</strong><br><strong>The introversion-extraversion dimension</strong>"},
{deck:"Mar 12 · Personality",category:"Social-Cognitive",q:"What is Bandura's social-cognitive theory of personality?",a:"Emphasizes <strong>reinforcement and punishment</strong> in personality development, but also includes <strong>cognitive processes</strong>.<br><br>Our <strong>interpretation</strong> of ourselves and our environment affects behavior."},
{deck:"Mar 12 · Personality",category:"Social-Cognitive",q:"What are reciprocal determinism, self-efficacy, and collective efficacy?",a:"<strong>Reciprocal determinism</strong>: behavior, environmental factors, and personality traits <strong>all affect one another</strong><br><strong>Self-efficacy</strong>: belief that <strong>you can perform the behavior</strong> needed to produce a specific outcome<br><strong>Collective efficacy</strong>: belief that <strong>your group</strong> can achieve an outcome together"},
{deck:"Mar 12 · Personality",category:"Assessment",q:"How do the experience-sampling method and locus of control scale assess personality?",a:"<strong>Experience-Sampling Method</strong>: participants carry a beeper that goes off randomly and record their current <strong>experiences and behaviors</strong>.<br><br><strong>Locus of Control Scale</strong>: developed by <strong>Julian Rotter</strong>; measures whether people see outcomes as under <strong>internal</strong> or <strong>external control</strong>. Uses <strong>29 pairs of statements</strong>."},
{deck:"Mar 12 · Personality",category:"Social-Cognitive",q:"What did the slides mean by social learning and situational variability in traits?",a:"Traits are fairly consistent, but behavior varies across situations because context changes whether a behavior is <strong>Rewarded</strong>, <strong>Punished</strong>, or <strong>Ignored</strong>."},
{deck:"Mar 12 · Personality",category:"Humanistic",q:"What is Maslow's self-actualization theory, and what are self-actualized people like?",a:"<strong>Self-actualization</strong> is a person's <strong>predisposition to fulfill their potential</strong>, linked to <strong>psychological well-being</strong>.<br><br>Self-actualized people tend to:<br><strong>Accept themselves and others</strong><br><strong>Enjoy strong, intimate relationships</strong><br><strong>Show creative and autonomous behavior</strong><br><strong>Have a realistic orientation</strong>"},
{deck:"Mar 12 · Personality",category:"Humanistic",q:"What did Rogers argue about self-concept, incongruence, and anxiety?",a:"Rogers argued that self-actualization requires acceptance of the <strong>self-concept</strong>.<br>Conflict between <strong>self-concept</strong> and <strong>personal experience</strong> creates <strong>incongruence</strong> and anxiety.<br><br>Anxiety can be reduced by <strong>altering the self</strong> or <strong>reinterpreting the experience</strong>. Too much incongruence can contribute to <strong>psychological disorders</strong>."},
{deck:"Mar 12 · Personality",category:"Assessment",q:"What are the Personal Orientation Inventory and the Q-Sort?",a:"<strong>Personal Orientation Inventory</strong>: forced-choice inventory measuring how much a person's attitudes match Maslow's picture of <strong>self-actualized people</strong>.<br><br><strong>Q-Sort</strong>: based on Rogers; measures congruence between <strong>actual self</strong> and <strong>ideal self</strong> by sorting descriptive cards."},
{deck:"Mar 12 · Personality",category:"Genes",q:"What did the slides say about behavioral-genetic research and personality traits?",a:"Behavioral-genetic research shows personality traits are heritable. For the <strong>Big Five</strong>, overall heritability ≈ <strong>0.5</strong>. Findings replicated in many countries."},
{deck:"Mar 12 · Personality",category:"Genes",q:"What heritability estimates did the table give for each Big Five trait?",a:"<strong>Extraversion</strong>: <strong>.49</strong><br><strong>Openness</strong>: <strong>.45</strong><br><strong>Neuroticism</strong>: <strong>.41</strong><br><strong>Conscientiousness</strong>: <strong>.38</strong><br><strong>Agreeableness</strong>: <strong>.35</strong><br><br><em>Cue:</em> Extraversion highest, Agreeableness lowest."},
{deck:"Mar 12 · Personality",category:"Temperament",q:"What early temperament differences appear in infants, and why are they important?",a:"In the first weeks, babies differ in <strong>Activity level</strong>, <strong>Mood</strong>, <strong>Responsiveness</strong>, <strong>Heart rate</strong>, and <strong>Attention span</strong>.<br>Differences appear even when controlling for <strong>prenatal influences</strong>."},
{deck:"Mar 12 · Personality",category:"Temperament",q:"How stable is temperament, and what did Kagan find about reactive and nonreactive children?",a:"Temperaments are <strong>very stable over time</strong> and strongly influence personality traits.<br><br><strong>Jerome Kagan</strong> found about <strong>20%</strong> of children are either <strong>highly reactive</strong> or <strong>nonreactive</strong>; ~<strong>80%</strong> fall in between."},
{deck:"Mar 12 · Personality",category:"Temperament",q:"What did the charted slide say about reactive versus nonreactive infants under mild stress?",a:"During mildly stressful tasks, <strong>reactive children</strong> show:<br><strong>Higher cortisol, epinephrine, and norepinephrine</strong><br><strong>Higher heart rates</strong><br><strong>Heightened neural activity</strong><br><br>Tied to the stress axis: <strong>hypothalamus → pituitary gland → adrenal gland</strong>."},

// MAR 17 · HEALTH & STRESS
{deck:"Mar 17 · Health & Stress",category:"Foundations",q:"What is health psychology, and what model of health does it usually favor?",a:"<strong>Health psychology</strong> studies how <strong>psychological factors</strong> affect the <strong>causes and treatment of physical illness</strong> and the <strong>maintenance of health</strong>.<br><br>Health psychologists usually favor the <strong>biopsychosocial model</strong>."},
{deck:"Mar 17 · Health & Stress",category:"Stress Basics",q:"What are stressors and stress, and what did Hans Selye add to stress research?",a:"<strong>Stressors</strong>: psychological or physical demands that trigger physiological adjustment.<br><strong>Stress</strong>: the body's physiological response to those demands.<br><br><strong>Hans Selye</strong> distinguished <strong>eustress</strong> (pleasant stress) from <strong>distress</strong> (unpleasant stress)."},
{deck:"Mar 17 · Health & Stress",category:"Stress Basics",q:"Why is stress called a double-edged sword?",a:"<strong>Adaptive side</strong>: increases available energy, distributes energy efficiently, enhances emotional learning.<br><br><strong>Harmful side</strong>: can promote <strong>autoimmune disorders</strong>, <strong>hypertension</strong>, <strong>heart disease</strong>, <strong>mental illness</strong>, and <strong>impaired episodic memory</strong>."},
{deck:"Mar 17 · Health & Stress",category:"Stress Basics",q:"What are perceived control and learned helplessness?",a:"<strong>Perceived control</strong>: how much a person believes they can control stressors.<br><strong>Learned helplessness</strong>: the belief that one has little or no control over life events, which can contribute to <strong>depression</strong>."},
{deck:"Mar 17 · Health & Stress",category:"Biopsychology",q:"What is the fight-or-flight response?",a:"Activation of the <strong>sympathetic nervous system</strong> plus release of stress hormones (<strong>cortisol</strong>, <strong>epinephrine</strong>, <strong>norepinephrine</strong>) by the adrenal glands.<br><br>First described by <strong>Walter Cannon</strong>."},
{deck:"Mar 17 · Health & Stress",category:"Biopsychology",q:"What is the HPA axis sequence shown in the chart?",a:"<strong>Hypothalamus</strong> → releasing factor → <strong>Pituitary gland</strong> → <strong>ACTH</strong> → <strong>Adrenal gland</strong> → release of <strong>cortisol</strong> and <strong>catecholamines</strong>."},
{deck:"Mar 17 · Health & Stress",category:"Biopsychology",q:"What is General Adaptation Syndrome?",a:"Selye's three-stage model of the body's physiological response to stress:<br><strong>1) Alarm</strong><br><strong>2) Resistance</strong><br><strong>3) Exhaustion</strong>"},
{deck:"Mar 17 · Health & Stress",category:"Disease Links",q:"Which noninfectious diseases were linked to stress, and what does psychosomatic mean?",a:"Stress-affected noninfectious diseases: <strong>Asthma</strong>, <strong>Diabetes</strong>, <strong>Gastric ulcers</strong>, <strong>Essential hypertension</strong>.<br><br><strong>Psychosomatic</strong>: physical symptoms caused or worsened by <strong>psychological factors</strong>."},
{deck:"Mar 17 · Health & Stress",category:"Disease Links",q:"What is atherosclerosis, and what stress-related point did the slide make about cholesterol?",a:"<strong>Atherosclerosis</strong>: narrowing of arteries due to <strong>cholesterol deposits</strong>; causes <strong>coronary heart disease</strong>.<br><br>Even the <strong>anticipation of an upcoming exam</strong> can increase blood cholesterol."},
{deck:"Mar 17 · Health & Stress",category:"Disease Links",q:"What is the Type A behavior pattern, and what did the Friedman and Rosenman study find?",a:"<strong>Type A</strong>: involves <strong>impatience</strong>, <strong>hostility</strong>, <strong>time urgency</strong>, and <strong>competitive achievement goals</strong>.<br><br>In their study of 3000 healthy middle-aged men, about <strong>two-thirds</strong> of those who had heart attacks were classified as <strong>Type A</strong>."},
{deck:"Mar 17 · Health & Stress",category:"Disease Links",q:"Why are Type A people and cynical hostility risky for health?",a:"Type A individuals try to <strong>control their environment</strong>, leading to repeated <strong>physiological arousal</strong>.<br>People high in <strong>cynical hostility</strong> are more physiologically reactive to stressors and show bigger increases in <strong>cortisol</strong>, <strong>epinephrine</strong>, and <strong>norepinephrine</strong>."},
{deck:"Mar 17 · Health & Stress",category:"Disease Links",q:"How did the slides connect stress and cancer?",a:"<strong>Indirectly</strong>: by increasing risky behaviors like <strong>smoking</strong>, <strong>high-fat eating</strong>, <strong>overconsumption of alcohol</strong>.<br><strong>Directly</strong>: by <strong>interfering with the immune system</strong>.<br><br>Cancer also linked to <strong>suppression of emotions</strong>, associated with reduced immune responses."},
{deck:"Mar 17 · Health & Stress",category:"Immune System",q:"What is psychoneuroimmunology, and what do B- and T-lymphocytes do?",a:"<strong>Psychoneuroimmunology</strong>: studies the relationship between <strong>physical illness</strong> and <strong>psychological factors</strong>.<br><br><strong>B-lymphocytes</strong>: attack <strong>bacteria</strong><br><strong>T-lymphocytes</strong>: attack <strong>viruses</strong>, <strong>foreign tissues</strong>, and <strong>cancer cells</strong>"},
{deck:"Mar 17 · Health & Stress",category:"Stress Management",q:"What causes burnout, and what message was highlighted with the Frankl quote?",a:"<strong>Burnout</strong>: linked to defining yourself by your career and tying self-worth to success at work.<br><br>Frankl quote: even in extreme hardship, a person still has freedom to <strong>choose their attitude</strong>."},
{deck:"Mar 17 · Health & Stress",category:"Stress Management",q:"What is repressive coping?",a:"<strong>Repressive coping</strong>: keeping an <strong>artificially positive viewpoint</strong> by avoiding situations or thoughts that remind you of a stressor."},
{deck:"Mar 17 · Health & Stress",category:"Stress Management",q:"What is reframing, and what is stress inoculation training?",a:"<strong>Reframing</strong>: thinking about stressors in a <strong>new or creative way</strong> that reduces their threat.<br><strong>Stress inoculation training</strong>: therapy that helps people build <strong>positive ways of thinking</strong> so they can cope better with stressors."},
{deck:"Mar 17 · Health & Stress",category:"Body Management",q:"What are relaxation therapy and the relaxation response?",a:"<strong>Relaxation therapy</strong>: consciously relaxing muscles to reduce tension.<br><strong>Relaxation response</strong>: lower <strong>muscle tension</strong>, <strong>cortical activity</strong>, <strong>heart rate</strong>, <strong>breathing rate</strong>, and <strong>blood pressure</strong>.<br><br><strong>Edmund Jacobson</strong> used <strong>EMG</strong> to show the importance of muscle activity in relaxation."},
{deck:"Mar 17 · Health & Stress",category:"Body Management",q:"What is biofeedback, and what was said about EEG biofeedback?",a:"<strong>Biofeedback</strong>: using an external monitoring device to gain more <strong>control</strong> over a bodily function.<br><br><strong>EEG biofeedback</strong> is <strong>moderately successful</strong> for disorders involving <strong>brain-wave abnormalities</strong>."},
{deck:"Mar 17 · Health & Stress",category:"Body Management",q:"What counts as aerobic exercise, and why can it improve mood?",a:"<strong>Aerobic exercise</strong>: raises <strong>heart rate</strong> and <strong>oxygen intake</strong> for a sustained time.<br>Improves mood and reduces depression symptoms, likely via increases in <strong>serotonin</strong> and <strong>endorphins</strong>."},
{deck:"Mar 17 · Health & Stress",category:"Health Psychology",q:"How does optimism affect health?",a:"<strong>Optimists</strong> are more likely to maintain <strong>positive emotions</strong>, avoid negative emotions, and stick to <strong>prescribed medical treatment</strong>.<br>The slides note that <strong>pessimists can be trained</strong> to become more optimistic, benefiting health."},
{deck:"Mar 17 · Health & Stress",category:"Health Psychology",q:"Which health-promoting behaviors were listed?",a:"<strong>Self-regulation</strong><br><strong>Eating wisely</strong><br><strong>Avoiding sexual risks</strong><br><strong>Not smoking</strong>"},
{deck:"Mar 17 · Health & Stress",category:"Study Habits",q:"What did the slides say about stress and procrastination?",a:"Procrastination linked to <strong>depression</strong>, <strong>low self-esteem</strong>, <strong>anxiety</strong>, and <strong>poor study habits</strong>.<br>Also linked to <strong>perceived stress</strong>, <strong>negative life events</strong>, and <strong>daily hassles</strong>.<br>Overall: linked to <strong>negative mental-health outcomes</strong>."},

// MAR 24 · STRESS MANAGEMENT
{deck:"Mar 24 · Stress Mgmt",category:"Stress Management",q:"What broad stress-management themes structured the Mar 24 lecture?",a:"Two big directions:<br><strong>Mind management</strong>: how you think about and approach stressors<br><strong>Body management</strong>: how you regulate bodily tension and arousal"},
{deck:"Mar 24 · Stress Mgmt",category:"Mind Management",q:"What did the Mar 24 lecture say about repressors, arousal, and the HPA axis?",a:"The <strong>repressive dissociation hypothesis</strong>: repressors often show <strong>higher arousal</strong> when confronted with ambiguous situations, increasing blood pressure through <strong>cortisol</strong> release.<br><br>Alternative: the <strong>HPA axis is dysregulated</strong> in repressors."},
{deck:"Mar 24 · Stress Mgmt",category:"Mind Management",q:"What is rational coping, and what three steps does it involve?",a:"<strong>Rational coping</strong>: facing a stressor and working to overcome it rather than avoiding it.<br><br>Three steps:<br><strong>1) Acceptance</strong><br><strong>2) Exposure</strong> (sometimes prolonged)<br><strong>3) Understanding</strong>"},
{deck:"Mar 24 · Stress Mgmt",category:"Illness",q:"What did the Mar 24 lecture say about recognizing illness and pain sensitivity?",a:"There are <strong>many individual differences in pain sensitivity</strong>.<br>Differences found in the <strong>primary somatosensory areas</strong> and the <strong>anterior cingulate cortex</strong>."},
{deck:"Mar 24 · Stress Mgmt",category:"Somatoform Disorders",q:"What are somatoform disorders, and what is hypochondriasis?",a:"<strong>Somatoform disorders</strong>: psychological disorders where a person shows <strong>physical symptoms</strong> that cannot be explained by a known medical condition.<br><br><strong>Hypochondriasis</strong>: preoccupation with minor symptoms and an <strong>unrealistic belief</strong> that they reflect a life-threatening disease."},
{deck:"Mar 24 · Stress Mgmt",category:"Somatoform Disorders",q:"What are somatization disorder and conversion disorder?",a:"<strong>Somatization disorder</strong>: many physical complaints without a medical explanation.<br><strong>Conversion disorder</strong>: person appears debilitated by physical symptoms that are actually <strong>voluntary</strong>, though experienced as <strong>involuntary</strong>."},
{deck:"Mar 24 · Stress Mgmt",category:"PTSD",q:"What question did the Mar 24 lecture ask about hippocampal size and PTSD risk?",a:"Should the <strong>hippocampal sizes of soldiers</strong> be measured to determine PTSD risk before deployment?<br><br><em>Key point:</em> raises an ethical question about using brain measures to predict psychological risk."},

// MAR 26 · PSYCHOPATHOLOGY
{deck:"Mar 26 · Psychopathology",category:"Foundations",q:"What is psychopathology?",a:"<strong>Psychopathology</strong> is the <strong>study of psychological disorders</strong>."},
{deck:"Mar 26 · Psychopathology",category:"Classification",q:"What is the DSM-5-TR?",a:"<strong>DSM-5-TR</strong> is a classification system that describes the features used to diagnose each recognized mental disorder and how to distinguish it from similar problems."},
{deck:"Mar 26 · Psychopathology",category:"Classification",q:"Which broad disorder categories were listed on the classification slide?",a:"Categories include: <strong>Neurodevelopmental</strong>, <strong>Schizophrenia spectrum</strong>, <strong>Bipolar and related</strong>, <strong>Depressive</strong>, <strong>Anxiety</strong>, <strong>OCD and related</strong>, <strong>Trauma- and stressor-related</strong>, <strong>Dissociative</strong>, <strong>Somatic symptom</strong>, <strong>Feeding and eating</strong>, <strong>Sleep-wake</strong>, <strong>Personality</strong>, <strong>Substance use and addictive</strong>, <strong>Neurocognitive</strong>, plus elimination, sexual dysfunctions, gender dysphoria, conduct-related, paraphilic, and other disorders."},
{deck:"Mar 26 · Psychopathology",category:"Classification",q:"What diagnostic issues did Wakefield say need improvement?",a:"<strong>High risk of false positives</strong><br><strong>Need to clarify risk versus disorder</strong><br><strong>Need to interpret symptoms within their context</strong>"},
{deck:"Mar 26 · Psychopathology",category:"Classification",q:"What did the Rosenhan study demonstrate?",a:"Rosenhan's 1973 study showed that the label <strong>'mentally ill'</strong> strongly shaped how staff <strong>observed and interpreted patients</strong> — professionals could not easily distinguish who really had a disorder."},
{deck:"Mar 26 · Psychopathology",category:"History",q:"How did Hippocrates and Paracelsus differ in their historical views of mental illness?",a:"<strong>Hippocrates</strong>: psychological disorders have <strong>natural causes</strong>.<br><strong>Paracelsus</strong>: unusual behavior could be attributed to the <strong>moon</strong>."},
{deck:"Mar 26 · Psychopathology",category:"Viewpoints",q:"How do the biopsychological, psychoanalytic, and behavioral viewpoints explain psychological disorders?",a:"<strong>Biopsychological</strong>: inherited/acquired brain problems, neurotransmitter imbalance, or brain-structure damage<br><strong>Psychoanalytic</strong>: unconscious childhood conflicts (often sex or aggression)<br><strong>Behavioral</strong>: punishment/extinction of appropriate behavior + reinforcement of inappropriate behavior"},
{deck:"Mar 26 · Psychopathology",category:"Viewpoints",q:"How do the cognitive and humanistic viewpoints explain psychological disorders?",a:"<strong>Cognitive</strong>: irrational and maladaptive thinking about the self, autobiographical memories, and the world<br><strong>Humanistic</strong>: incongruence between the <strong>actual self</strong> and the <strong>public self</strong> from trying too hard to meet others' demands"},
{deck:"Mar 26 · Psychopathology",category:"Viewpoints",q:"How do the social-cultural and diathesis-stress viewpoints explain psychological disorders?",a:"<strong>Social-cultural</strong>: social and cultural factors shape the prevalence of disorders and symptoms<br><strong>Diathesis-stress</strong>: stressful life experiences interact with biological predispositions to produce disorders"},
{deck:"Mar 26 · Psychopathology",category:"Anxiety Disorders",q:"What is an anxiety disorder, and what two broad points did the slide stress?",a:"<strong>Anxiety disorders</strong>: mental disorders where <strong>anxiety is the predominant feature</strong>.<br><br>Key points:<br><strong>People often have more than one anxiety disorder at once</strong><br><strong>Anxiety and depression show significant comorbidity</strong>"},
{deck:"Mar 26 · Psychopathology",category:"Anxiety Disorders",q:"What is GAD, and what symptoms define it?",a:"<strong>GAD</strong>: chronic, excessive worry plus at least <strong>three or more</strong> of: <strong>Restlessness</strong>, <strong>Fatigue</strong>, <strong>Concentration problems</strong>, <strong>Irritability</strong>, <strong>Muscle tension</strong>, <strong>Sleep disturbance</strong>."},
{deck:"Mar 26 · Psychopathology",category:"Anxiety Disorders",q:"What key facts were given about GAD?",a:"GAD affects about <strong>5% of North Americans</strong> at some point. More common in <strong>low-SES populations</strong>. About <strong>twice as common in women</strong>. Has both <strong>biological and psychological risk factors</strong>. Can be helped by <strong>benzodiazepines</strong>."},
{deck:"Mar 26 · Psychopathology",category:"Anxiety Disorders",q:"What is panic disorder, and what symptoms often occur during a panic attack?",a:"<strong>Panic disorder</strong>: sudden episodes of multiple psychological and physiological symptoms creating a feeling of <strong>terror</strong>.<br><br>Symptoms: <strong>fear of dying</strong>, <strong>fear of going insane</strong>, <strong>dizziness</strong>, <strong>trembling</strong>, <strong>cold sweats</strong>, <strong>heart palpitations</strong>, <strong>shortness of breath</strong>. Usually lasts only <strong>a few minutes</strong>."},
{deck:"Mar 26 · Psychopathology",category:"Anxiety Disorders",q:"What prevalence facts were given about panic attacks and panic disorder?",a:"About <strong>22%</strong> of people report at least one panic attack (often during high stress).<br>About <strong>3.5%</strong> will have <strong>panic disorder</strong> in their lifetime.<br>People with panic attacks may be <strong>hypersensitive to bodily signs of anxiety</strong>."},
{deck:"Mar 26 · Psychopathology",category:"Anxiety Disorders",q:"What are phobic disorders, and how do specific phobia, social phobia, and agoraphobia differ?",a:"<strong>Phobic disorders</strong>: persistent, excessive fear and avoidance of specific objects, situations, or activities.<br><br><strong>Specific phobia</strong>: irrational fear of a particular thing; more common in women and shaped by culture<br><strong>Social phobia</strong>: fear of situations involving <strong>public scrutiny</strong><br><strong>Agoraphobia</strong>: fear of being in public, often due to fear of a panic attack or embarrassment"},
{deck:"Mar 26 · Psychopathology",category:"Anxiety Disorders",q:"What is preparedness theory?",a:"Proposed by <strong>Martin Seligman</strong>: people are instinctively <strong>predisposed toward certain fears</strong>.<br>Some research supports this; <strong>temperament may also play a role</strong>."},
{deck:"Mar 26 · Psychopathology",category:"OCD",q:"What is OCD?",a:"<strong>OCD</strong>: <strong>intrusive thoughts</strong> (<strong>obsessions</strong>) and <strong>ritualistic behaviors</strong> (<strong>compulsions</strong>) meant to relieve those thoughts that interfere with daily functioning."},
{deck:"Mar 26 · Psychopathology",category:"OCD",q:"What major facts did the lecture give about OCD?",a:"Strongly involves anxiety. Not easily controlled by ignoring thoughts. Affects about <strong>1.3%</strong> of people. Slightly lower rates in <strong>Asian cultures</strong>. Slightly more common in <strong>women</strong>. Shows <strong>moderate genetic heritability</strong>."},
{deck:"Mar 26 · Psychopathology",category:"OCD",q:"Which obsessions and compulsions were listed as most common in OCD?",a:"Most common themes: <strong>Cleaning</strong>, <strong>Checking</strong>, <strong>Repeating</strong>, <strong>Ordering/arranging</strong>, <strong>Counting</strong>.<br><br>These usually grow from concerns that could <strong>actually pose a threat</strong>."},
{deck:"Mar 26 · Psychopathology",category:"OCD",q:"What brain area was linked to OCD?",a:"Activity in the <strong>caudate nucleus</strong> may be <strong>higher</strong> in people with OCD."},
{deck:"Mar 26 · Psychopathology",category:"Debate",q:"What issue was raised by the Thomas Szasz quote?",a:"Whether <strong>'mental illness'</strong> is a real medical phenomenon or a label used to make moral and social conflicts more acceptable. Framed as a question to evaluate, not a settled fact."},

// MAR 31 · DISORDERS
{deck:"Mar 31 · Disorders",category:"Bipolar",q:"What is bipolar disorder, and what basic facts were given about it?",a:"<strong>Bipolar disorder</strong>: unstable emotional condition involving cycles of persistent <strong>mania</strong> and <strong>depression</strong>.<br>About <strong>1.3% lifetime incidence</strong>. <strong>Equally common in men and women</strong>. <strong>Most cases are recurrent</strong>."},
{deck:"Mar 31 · Disorders",category:"Bipolar",q:"What did the biopsychological viewpoint say about bipolar disorder?",a:"Bipolar disorder has the <strong>highest heritability</strong> of any mental disorder.<br>Twin data: <strong>40%-70% concordance</strong> for identical twins; <strong>10%</strong> for fraternal twins.<br>Usually <strong>polygenic</strong>."},
{deck:"Mar 31 · Disorders",category:"Bipolar",q:"What did the diathesis-stress and cognitive viewpoints say about bipolar disorder?",a:"<strong>Diathesis-stress</strong>: stressful life events often precede both <strong>manic</strong> and <strong>depressive</strong> episodes.<br><strong>Cognitive</strong>: personality characteristics predict increases in symptoms; <strong>family supportiveness</strong> affects relapse rates."},
{deck:"Mar 31 · Disorders",category:"Suicide",q:"How did the CDC define suicide, and which related terms did the lecture distinguish?",a:"Suicide: <strong>death from injury, poisoning, or suffocation</strong> where evidence shows the act was <strong>self-inflicted</strong> and the person <strong>intended to die</strong>.<br><br>Related terms: <strong>Completed suicide</strong>, <strong>Suicide attempt</strong>, <strong>Suicidal ideation</strong>"},
{deck:"Mar 31 · Disorders",category:"Suicide",q:"What prevalence facts were given about suicide attempts, suicidal thoughts, and deaths?",a:"About <strong>3%</strong> of the population makes a suicide attempt. More than <strong>13%</strong> report <strong>suicidal thoughts</strong>. Worldwide, about <strong>800,000 people</strong> die by suicide each year."},
{deck:"Mar 31 · Disorders",category:"Suicide",q:"What gender differences were given for suicide?",a:"<strong>Women</strong> are more likely to <strong>attempt</strong> suicide.<br><strong>Men</strong> have higher rates of <strong>completed</strong> suicide."},
{deck:"Mar 31 · Disorders",category:"Suicide",q:"What common motives for suicide were listed?",a:"<strong>Sense of alienation</strong><br><strong>Intolerable psychological suffering</strong><br><strong>Intolerable physical suffering</strong><br><strong>Hopelessness</strong><br><strong>Escape from feeling worthless</strong>"},
{deck:"Mar 31 · Disorders",category:"Suicide",q:"Which warning signs of suicide were listed?",a:"Talking about suicide (~90% of suicidal people discuss their intentions), previous attempts, a more positive mood after a long depressive episode, failed love, severe stressful events involving shame or humiliation, family history of suicide, reckless behavior, drop in school/work performance, withdrawal from people and activities, increased drug and alcohol use."},
{deck:"Mar 31 · Disorders",category:"Dissociative",q:"What is a dissociative disorder?",a:"Normal cognitive processes become <strong>disjointed and fragmented</strong>, producing disruptions in <strong>memory</strong>, <strong>awareness</strong>, or <strong>personality</strong>. Can last from <strong>minutes</strong> to <strong>many years</strong>."},
{deck:"Mar 31 · Disorders",category:"Dissociative",q:"What is DID, and what prevalence facts were given?",a:"<strong>DID</strong>: two or more distinct identities that take control of behavior at different times.<br>Prevalence: <strong>0.5%-1%</strong> general population. <strong>Male-to-female ratio of 1:9</strong>."},
{deck:"Mar 31 · Disorders",category:"Dissociative",q:"How did the psychodynamic view explain DID?",a:"Many people with DID have histories of severe <strong>child abuse or trauma</strong>. May reflect the defense mechanism of <strong>splitting</strong>, used to escape psychological pain."},
{deck:"Mar 31 · Disorders",category:"Dissociative",q:"What are dissociative amnesia and dissociative fugue?",a:"<strong>Dissociative amnesia</strong>: abrupt loss of memories for important personal information.<br><strong>Dissociative fugue</strong>: abrupt loss of personal-history memories plus leaving home and taking on a <strong>new identity</strong>.<br><br>Both usually begin in <strong>adulthood</strong>, but rarely after <strong>50</strong>."},
{deck:"Mar 31 · Disorders",category:"Schizophrenia",q:"What is schizophrenia, and what basic facts were given?",a:"Major impairment in <strong>emotional</strong>, <strong>social</strong>, <strong>cognitive</strong>, and <strong>perceptual</strong> functioning.<br>Term coined by <strong>Eugen Bleuler</strong> in 1911. Affects about <strong>1%</strong> of the population. <strong>Slightly more common in men</strong>. Rarely develops before <strong>early adolescence</strong>."},
{deck:"Mar 31 · Disorders",category:"Schizophrenia",q:"What are hallucinations in schizophrenia, and what brain-related point was made?",a:"<strong>Hallucinations</strong>: false perceptual experiences that seem real without external stimulation. Usually <strong>auditory</strong>.<br><br>Linked to increased activity in the <strong>cerebral cortex</strong> that normally processes the relevant sensory information."},
{deck:"Mar 31 · Disorders",category:"Schizophrenia",q:"What cognitive symptoms of schizophrenia were listed?",a:"<strong>Difficulty with attention</strong><br><strong>Disorganized speech</strong>: rapid, incoherent shifting from topic to topic<br><strong>Delusions</strong>: beliefs held despite being clearly false<br><br>Two types: <strong>delusions of influence</strong> (most common) and <strong>delusions of grandeur</strong>."},
{deck:"Mar 31 · Disorders",category:"Schizophrenia",q:"What social-emotional symptoms of schizophrenia were listed?",a:"<strong>Negative symptoms</strong>: emotional and social withdrawal, apathy, poverty of speech, absence of normal motivation and emotion.<br><strong>Emotional inappropriateness</strong>: odd reactions (e.g., laughing when someone is badly injured).<br>Trouble recognizing emotion from <strong>faces</strong> and <strong>voices</strong>."},
{deck:"Mar 31 · Disorders",category:"Schizophrenia",q:"What motor symptoms of schizophrenia were listed?",a:"Bizarre activity such as: <strong>tracing patterns in the air</strong>, <strong>unusual eye movements</strong>, <strong>rocking incessantly</strong>, <strong>making bizarre faces</strong>, <strong>pacing back and forth</strong>, <strong>holding poses for hours</strong>."},
{deck:"Mar 31 · Disorders",category:"Schizophrenia",q:"What did the biopsychological viewpoint say about genetic risk for schizophrenia?",a:"Twin concordance: about <strong>48%</strong> for identical twins; about <strong>17%</strong> for fraternal twins.<br><strong>Prenatal and perinatal environments</strong> may also affect rates."},
{deck:"Mar 31 · Disorders",category:"Schizophrenia",q:"What neuroanatomical changes were linked to schizophrenia?",a:"<strong>Progressive tissue loss</strong> in the <strong>parietal lobe</strong> that may spread more broadly.<br><strong>More dramatic neural pruning</strong> than normal."},
{deck:"Mar 31 · Disorders",category:"Schizophrenia",q:"What did the diathesis-stress viewpoint say about schizophrenia and family environment?",a:"The <strong>family environment</strong> plays an important role in both the <strong>development</strong> of schizophrenia and <strong>recovery</strong> from it."},
{deck:"Mar 31 · Disorders",category:"Personality",q:"How did the Mar 31 lecture define personality and personality traits?",a:"<strong>Personality</strong>: enduring patterns of <strong>feeling</strong>, <strong>perceiving</strong>, <strong>thinking about</strong>, and <strong>relating to yourself and your environment</strong>.<br><strong>Personality traits</strong>: core elements that stay fairly consistent across <strong>time</strong> and <strong>situations</strong>."},
{deck:"Mar 31 · Disorders",category:"Personality",q:"What did the Big Five table say about negative emotionality and extraversion?",a:"<strong>Negative emotionality vs emotional stability</strong>: high scorers tend to be fearful, angry, pessimistic, self-conscious, vulnerable; low scorers are more relaxed and even-tempered.<br><br><strong>Extraversion vs introversion</strong>: high scorers are warm, sociable, assertive, active, excitement-seeking; low scorers are more aloof, withdrawn, quiet."},
{deck:"Mar 31 · Disorders",category:"Personality",q:"What did the Big Five table say about openness, agreeableness, and conscientiousness?",a:"<strong>Openness</strong>: high = imaginative, aesthetic, unconventional; low = practical, routine-driven, traditional.<br><br><strong>Agreeableness</strong>: high = trusting, honest, cooperative, empathic; low = cynical, manipulative, aggressive.<br><br><strong>Conscientiousness</strong>: high = organized, dependable, ambitious; low = disorganized, undependable, aimless."},
{deck:"Mar 31 · Disorders",category:"Personality Disorders",q:"What is a personality disorder according to the DSM-5?",a:"DSM-5 takes a <strong>categorical perspective</strong>. A personality disorder is an enduring pattern of <strong>feeling</strong>, <strong>thinking</strong>, and <strong>behaving</strong> that is fairly stable over time. Traits must be visible by <strong>early adulthood</strong>. Clinicians should consider <strong>ethnic</strong>, <strong>cultural</strong>, and <strong>social</strong> factors."},
{deck:"Mar 31 · Disorders",category:"Personality Disorders",q:"How did the slides group personality disorders into clusters?",a:"<strong>Cluster A</strong> (odd-eccentric): schizophrenia-like odd affect, odd thought, and paranoia — but reality testing is maintained.<br><strong>Cluster B</strong> (dramatic-emotional): manipulative, volatile, uncaring, impulsive, risky.<br><strong>Cluster C</strong> (anxious-fearful): highly concerned about criticism or abandonment; often dysfunctional relationships."},
{deck:"Mar 31 · Disorders",category:"Personality Disorders",q:"Which personality disorders were listed, and what barriers to treatment were named?",a:"Disorders listed: <strong>Antisocial</strong>, <strong>Narcissistic</strong>, <strong>Histrionic</strong>, <strong>Borderline</strong>, <strong>Avoidant</strong>, <strong>Dependent</strong>, <strong>OCPD</strong>, <strong>Schizotypal</strong>.<br><br>Barriers: <strong>not realizing they need treatment</strong>, <strong>beliefs or circumstances keeping them from help</strong>, <strong>not knowing where to find services</strong>."}

// APR 2 · ABNORMALITY
,{deck:"Apr 2 · Abnormality",category:"Foundations",q:"What are a theory and a therapy, and what broad approach do many contemporary theorists adopt?",a:"<strong>Theory</strong>: a set of ideas that provides a framework for asking questions and collecting/interpreting information about a phenomenon.<br><strong>Therapy</strong>: a treatment based on a theory and aimed at the factors that theory says cause the problem.<br><br>Many contemporary theorists adopt a <strong>biopsychosocial approach</strong>."}
,{deck:"Apr 2 · Abnormality",category:"Foundations",q:"What are risk factors and transdiagnostic risk factors?",a:"<strong>Risk factors</strong> raise the chance of psychological problems.<br>Usually, one risk factor can increase risk for <strong>many different issues</strong>.<br><strong>Transdiagnostic risk factors</strong> are factors that increase risk for <strong>many kinds of psychological issues</strong>, though some risk factors can also lead to very specific symptoms."}
,{deck:"Apr 2 · Abnormality",category:"Foundations",q:"What does the diathesis-stress model say, and what examples did the diagram give?",a:"The <strong>diathesis-stress model</strong> says a disorder develops when a person has both an existing <strong>diathesis</strong> and a triggering <strong>stress</strong>.<br><br><strong>Diathesis examples</strong>: biological factors, social factors such as maladaptive upbringing/chronic stress, and psychological factors such as unconscious conflicts, poor skills, or maladaptive cognitions.<br><strong>Stress examples</strong>: biological triggers, social triggers such as trauma or major loss, and psychological triggers such as perceived loss of control or violation of trust."}
,{deck:"Apr 2 · Abnormality",category:"Biological Approaches",q:"How did the lecture describe treatments across different theoretical perspectives?",a:"The lecture emphasized that people from <strong>biological</strong>, <strong>psychological</strong>, and <strong>sociocultural</strong> perspectives tend to adopt <strong>different treatment approaches</strong>."}
,{deck:"Apr 2 · Abnormality",category:"Brain",q:"What are the three main brain areas?",a:"The brain was divided into three main areas:<br><strong>Hindbrain</strong><br><strong>Midbrain</strong><br><strong>Forebrain</strong>"}
,{deck:"Apr 2 · Abnormality",category:"Brain",q:"What major cortex and cerebrum regions were labeled on the brain diagram?",a:"The cortex diagram labeled the <strong>frontal</strong>, <strong>parietal</strong>, <strong>temporal</strong>, and <strong>occipital</strong> lobes, plus the <strong>motor cortex</strong>, <strong>sensory cortex</strong>, <strong>visual cortex</strong>, and <strong>auditory cortex</strong>.<br>It also showed the <strong>left</strong> and <strong>right hemispheres</strong>, the <strong>central fissure</strong>, <strong>longitudinal fissure</strong>, <strong>lateral fissure</strong>, and <strong>corpus callosum</strong>."}
,{deck:"Apr 2 · Abnormality",category:"Brain",q:"Which forebrain subcortical structures were listed?",a:"The lecture said subcortical structures lie just under the cerebrum and listed:<br><strong>Thalamus</strong><br><strong>Hypothalamus</strong><br><strong>Pituitary gland</strong><br><strong>Limbic system</strong>, including the <strong>amygdala</strong> and <strong>hippocampus</strong>"}
,{deck:"Apr 2 · Abnormality",category:"Brain",q:"What causes of brain dysfunction were listed?",a:"The lecture listed <strong>injury</strong> and <strong>disease</strong> as causes of brain dysfunction, with examples such as <strong>head injury from contact sports</strong> and <strong>Alzheimer's disease</strong>.<br>It also stressed that specific brain areas are tied to different psychological functions."}
,{deck:"Apr 2 · Abnormality",category:"Neurotransmitters",q:"What are neurotransmitters, and what factors in neurotransmission were linked to psychopathology?",a:"<strong>Neurotransmitters</strong> are biochemical messengers that carry impulses from one neuron to another in the brain and nervous system.<br><br>Symptoms may relate to:<br><strong>The amount of neurotransmitter in the synapse</strong>, affected by <strong>reuptake</strong> and <strong>degradation</strong><br><strong>The number of receptors</strong> on dendrites<br><strong>How well those receptors function</strong>"}
,{deck:"Apr 2 · Abnormality",category:"Neurotransmitters",q:"What did the lecture say about serotonin, dopamine, norepinephrine, and GABA?",a:"<strong>Serotonin</strong>: travels through many brain areas; dysfunction in serotonin regulation is a <strong>transdiagnostic risk factor</strong>.<br><strong>Dopamine</strong>: critical for <strong>reward/reinforcement</strong> and <strong>muscle systems</strong>; dopamine dysfunction is also a <strong>transdiagnostic risk factor</strong>.<br><strong>Norepinephrine</strong>: mainly produced by neurons in the <strong>brain stem</strong>.<br><strong>GABA</strong>: inhibits other neurotransmitters; many tranquilizing drugs work by <strong>increasing GABA activity</strong>."}
,{deck:"Apr 2 · Abnormality",category:"Hormones and Genes",q:"What is the endocrine system, and what is behavioral genetics?",a:"<strong>Endocrine system</strong>: a system of glands that produce <strong>hormones</strong>, which are released directly into the <strong>blood</strong>.<br><strong>Behavioral genetics</strong>: the study of the <strong>genetic basis</strong> of personality and abnormality."}
,{deck:"Apr 2 · Abnormality",category:"Hormones and Genes",q:"What did the lecture say about the serotonin transporter gene and depression?",a:"The <strong>serotonin transporter gene</strong> affects how serotonin systems function in the brain.<br>The lecture said that having at least <strong>one short allele</strong> can increase risk for <strong>depression</strong>.<br>It also emphasized that depression is likely <strong>polygenic</strong>, meaning many genes contribute."}
,{deck:"Apr 2 · Abnormality",category:"Hormones and Genes",q:"How do genes and environment interact, and what did the graph show?",a:"Genes can influence the <strong>environments we choose</strong>, and those environments can reinforce genetically influenced interests and personalities.<br><strong>Epigenetics</strong> means environmental factors can affect <strong>gene expression</strong>.<br><br>The graph showed a gene-by-environment interaction: as <strong>maltreatment</strong> increased, probability of <strong>depression</strong> rose most for the <strong>s/s genotype</strong>, less for <strong>s/l</strong>, and very little for <strong>l/l</strong>."}
,{deck:"Apr 2 · Abnormality",category:"Drug Therapies",q:"What is the general purpose of drug therapies in abnormal psychology?",a:"<strong>Drug therapies</strong> are used to improve the functioning of <strong>neurotransmitter systems</strong>, which can reduce psychological symptoms."}
,{deck:"Apr 2 · Abnormality",category:"Drug Therapies",q:"What did the lecture say about antipsychotic drugs?",a:"<strong>Antipsychotic drugs</strong> reduce symptoms of <strong>psychosis</strong>.<br><strong>Phenothiazines</strong> were the first antipsychotic group and helped reduce psychotic symptoms, but had side effects such as <strong>severe sedation</strong>, <strong>visual disturbances</strong>, and <strong>tardive dyskinesia</strong>.<br><strong>Atypical antipsychotics</strong> are effective for psychosis with <strong>fewer side effects</strong>."}
,{deck:"Apr 2 · Abnormality",category:"Drug Therapies",q:"What did the lecture say about antidepressants and lithium?",a:"<strong>Antidepressants</strong> reduce symptoms of <strong>depression</strong>.<br><strong>SSRIs</strong> are the most frequently used antidepressants.<br><strong>SNRIs</strong> target both <strong>serotonin</strong> and <strong>norepinephrine</strong>.<br><br><strong>Lithium</strong> is a <strong>mood stabilizer</strong> used for bipolar disorder, prescribed for more than <strong>60 years</strong>, and used to <strong>prevent/treat mania</strong>."}
,{deck:"Apr 2 · Abnormality",category:"Drug Therapies",q:"What did the lecture say about antianxiety drugs and the drug-therapy table examples?",a:"<strong>Barbiturates</strong>: induce relaxation and sleep, but are <strong>highly addictive</strong> and can cause dangerous withdrawal.<br><strong>Benzodiazepines</strong>: used for <strong>anxiety</strong>, <strong>insomnia</strong>, <strong>seizures</strong>, and <strong>neuropathic pain</strong>; examples include <strong>Xanax</strong>, <strong>Klonopin</strong>, <strong>Valium</strong>, and <strong>Ativan</strong>; they are also <strong>highly addictive</strong> and show significant withdrawal.<br><br>The table also gave examples such as <strong>Thorazine</strong>, <strong>Haldol</strong>, <strong>Clozaril</strong>, <strong>Parnate</strong>, <strong>Elavil</strong>, <strong>Prozac</strong>, <strong>Lithobid</strong>, <strong>Cibalith-S</strong>, <strong>Nembutal</strong>, and <strong>Valium</strong>."}
,{deck:"Apr 2 · Abnormality",category:"Brain Stimulation",q:"What is ECT, and what disorders was it said to help treat?",a:"<strong>ECT</strong> was introduced in the early 20th century and is used for <strong>severe mood disorders</strong>.<br>Treatment passes an electrical current through the brain to induce a <strong>seizure</strong>.<br><strong>Anesthesia</strong> and <strong>muscle relaxants</strong> are given first.<br><br>The lecture said it is effective for <strong>depressive disorders</strong>, <strong>bipolar disorder</strong>, and <strong>potentially OCD</strong>."}
,{deck:"Apr 2 · Abnormality",category:"Brain Stimulation",q:"What alternative brain-stimulation methods were listed?",a:"<strong>rTMS</strong>: a <strong>noninvasive</strong> method using high-intensity magnetic pulses focused on specific brain regions<br><strong>DBS</strong>: electrodes are <strong>surgically implanted</strong> into particular brain areas<br><strong>VNS</strong>: electrodes are surgically implanted in the <strong>vagus nerve</strong>"}
,{deck:"Apr 2 · Abnormality",category:"Psychosurgery",q:"What did the lecture say about psychosurgery, trephination, and prefrontal lobotomy?",a:"<strong>Psychosurgery</strong> was described as a <strong>controversial</strong> treatment approach.<br><strong>Trephination</strong> was a prehistoric crude brain surgery meant to release evil spirits.<br><strong>Prefrontal lobotomy</strong> was introduced in <strong>1935</strong> to treat psychosis.<br>By the <strong>1950s</strong> psychosurgery had declined a lot, and today it is used only <strong>rarely</strong>."}
,{deck:"Apr 2 · Abnormality",category:"Evaluation",q:"What were the main strengths and weaknesses of biological approaches?",a:"<strong>Pro</strong>: many people find biological approaches appealing because they support the view that mental disorders should be understood as <strong>medical diseases</strong>.<br><strong>Con</strong>: not everyone responds well to biological treatments, and many of these therapies have <strong>significant side effects</strong>."}

// APR 7 · ABNORMALITY
,{deck:"Apr 7 · Abnormality",category:"Behavioral",q:"What is the core idea of the behavioral approach, and what role did Pavlov play?",a:"Behavioral approaches focus on how abnormal behavior is <strong>learned</strong> and maintained through conditioning and observation.<br><strong>Ivan Pavlov</strong> was credited with discovering <strong>classical conditioning</strong>."}
,{deck:"Apr 7 · Abnormality",category:"Behavioral",q:"What are the law of effect and operant conditioning?",a:"<strong>E.L. Thorndike's law of effect</strong>: behaviors followed by <strong>reward</strong> are strengthened, and behaviors followed by <strong>punishment</strong> are weakened.<br><strong>Operant conditioning</strong> shapes behavior by using rewards for desired behaviors and punishments for undesired behaviors.<br><strong>B.F. Skinner</strong> strongly promoted research in this area."}
,{deck:"Apr 7 · Abnormality",category:"Behavioral",q:"Which operant-conditioning concepts were highlighted besides reward and punishment?",a:"The lecture also highlighted:<br><strong>Continuous reinforcement schedules</strong><br><strong>Partial reinforcement schedules</strong><br><strong>Extinction</strong>: elimination of a learned behavior<br><strong>Hobart Mowrer's two-factor model</strong>"}
,{deck:"Apr 7 · Abnormality",category:"Behavioral",q:"What did Bandura contribute to behavioral approaches?",a:"<strong>Albert Bandura</strong> developed <strong>social learning theory</strong>, arguing that people learn behaviors by <strong>watching others</strong>.<br>The lecture emphasized <strong>modeling</strong> and <strong>observational learning</strong>, and noted that some researchers use observational learning to help explain <strong>violence</strong> and <strong>criminal activity</strong>."}
,{deck:"Apr 7 · Abnormality",category:"Behavioral Therapies",q:"What is the focus of behavioral therapies, and what is systematic desensitization?",a:"Behavioral therapies focus on identifying the <strong>reinforcements and punishments</strong> that maintain maladaptive behaviors, then altering those behaviors through a <strong>behavioral assessment</strong> of the client's problem.<br><strong>Systematic desensitization</strong> is a gradual method for extinguishing <strong>anxiety responses</strong> and the maladaptive behavior linked to that anxiety."}
,{deck:"Apr 7 · Abnormality",category:"Behavioral Therapies",q:"What behavior-change techniques were listed in the table?",a:"The table listed these techniques:<br><strong>Removal of reinforcements</strong><br><strong>Aversion therapy</strong><br><strong>Relaxation exercises</strong><br><strong>Distraction techniques</strong><br><strong>Flooding/implosive therapy</strong><br><strong>Systematic desensitization</strong><br><strong>Response shaping through operant conditioning</strong><br><strong>Behavioral contracting</strong><br><strong>Modeling and observational learning</strong>"}
,{deck:"Apr 7 · Abnormality",category:"Behavioral Therapies",q:"How did the table describe flooding, systematic desensitization, behavioral contracting, and modeling?",a:"<strong>Flooding/implosive therapy</strong>: exposes the person to the feared stimulus while preventing avoidance<br><strong>Systematic desensitization</strong>: combines relaxation with hierarchical exposure to the aversive stimulus<br><strong>Behavioral contracting</strong>: provides rewards for reaching proximal goals<br><strong>Modeling and observational learning</strong>: models desired behaviors so the client can learn by observing"}
,{deck:"Apr 7 · Abnormality",category:"Evaluation",q:"How were behavioral approaches evaluated?",a:"The lecture said the effectiveness of <strong>behavioral therapies</strong> has been <strong>strongly supported</strong> in controlled studies."}
,{deck:"Apr 7 · Abnormality",category:"Cognitive",q:"What are causal attributions and global assumptions, and why do they matter?",a:"<strong>Causal attributions</strong> are the explanations we make for events in our lives, and they can influence both <strong>behavior</strong> and <strong>emotional responses/self-concept</strong>.<br><strong>Global assumptions</strong> are broad beliefs about <strong>ourselves</strong>, <strong>our relationships</strong>, and <strong>the world</strong>; they can be either positive/helpful or negative/destructive."}
,{deck:"Apr 7 · Abnormality",category:"Cognitive Therapies",q:"What is the focus of cognitive therapies?",a:"<strong>Cognitive therapies</strong> help clients identify and challenge <strong>negative or dysfunctional beliefs</strong>.<br>The goal is to work collaboratively with clients to define problems and teach <strong>effective problem-solving techniques</strong> so they can cope more adaptively."}
,{deck:"Apr 7 · Abnormality",category:"Cognitive Therapies",q:"What is CBT, and what did the lecture emphasize about it?",a:"<strong>Cognitive-Behavioral Therapy (CBT)</strong> combines <strong>cognitive techniques</strong> with <strong>behavioral techniques</strong>.<br>The lecture emphasized that CBT is <strong>problem-oriented</strong> and places strong emphasis on the <strong>present</strong>."}
,{deck:"Apr 7 · Abnormality",category:"Evaluation",q:"Which disorders were linked to maladaptive cognitions, and how was cognitive therapy assessed?",a:"Maladaptive cognitions were said to be common in:<br><strong>Mood disorders</strong><br><strong>Anxiety disorders</strong><br><strong>Sexual disorders</strong><br><strong>Eating disorders</strong><br><strong>Substance use disorders</strong><br><br>The lecture said <strong>cognitive therapy tends to be useful</strong> in treating these disorders."}
,{deck:"Apr 7 · Abnormality",category:"Psychodynamic",q:"What psychoanalytic ideas from Freud were highlighted?",a:"The lecture emphasized that <strong>Freud developed psychoanalysis</strong>.<br><strong>Catharsis</strong>: release of emotions connected to unconscious memories<br><strong>Repression</strong>: motivated forgetting of a distressing experience"}
,{deck:"Apr 7 · Abnormality",category:"Psychodynamic",q:"What are ego psychology and object relations?",a:"<strong>Ego psychology</strong> emphasizes a person's ability to regulate their <strong>defense mechanisms</strong>.<br><strong>Object relations</strong> theory says early relationships create <strong>unconscious representations</strong> of ourselves and others.<br>The slide named <strong>Klein</strong>, <strong>Mahler</strong>, and <strong>Kernberg</strong>."}
,{deck:"Apr 7 · Abnormality",category:"Psychodynamic Therapies",q:"What is the focus of psychodynamic therapy, and what key techniques were listed?",a:"Psychodynamic therapy aims to uncover and resolve <strong>unconscious factors</strong> behind symptoms.<br>Key ideas/techniques listed were:<br><strong>Free association</strong><br><strong>Client resistance</strong><br><strong>Transference</strong><br><strong>Countertransference</strong><br><br>The lecture said transference and countertransference can be important sources of <strong>insight</strong> and tools in therapy."}
,{deck:"Apr 7 · Abnormality",category:"Psychodynamic Therapies",q:"What is interpersonal therapy (IPT)?",a:"<strong>Interpersonal therapy (IPT)</strong> emerged from <strong>modern psychodynamic theory</strong> and focuses on the client's <strong>patterns of relationships</strong> with people in their life."}
,{deck:"Apr 7 · Abnormality",category:"Evaluation",q:"How were psychodynamic approaches assessed?",a:"The lecture said psychodynamic approaches played a strong role in shaping <strong>psychology</strong> and <strong>psychiatry</strong>.<br>Limitations listed were:<br><strong>Difficulty testing core assumptions with valid/reliable methods</strong><br><strong>Questionable generalizability</strong><br><strong>Financial inaccessibility</strong> because treatment is often long-term"}
,{deck:"Apr 7 · Abnormality",category:"Humanistic",q:"What was Rogers' basic humanistic view of people?",a:"<strong>Carl Rogers</strong> believed people naturally move toward <strong>personal growth</strong>, <strong>self-acceptance</strong>, and <strong>self-actualization</strong>.<br>The lecture added that <strong>pressure from others</strong> can interfere with that growth."}
,{deck:"Apr 7 · Abnormality",category:"Humanistic Therapy",q:"What is the purpose of humanistic therapy, and what is client-centered therapy?",a:"<strong>Humanistic therapy</strong> aims to help clients discover their greatest potential through <strong>self-exploration</strong>.<br><strong>Client-centered therapy (CCT)</strong>, developed by Rogers, involves the therapist communicating:<br><strong>Genuineness</strong><br><strong>Unconditional positive regard</strong><br><strong>Empathetic understanding</strong><br><br>The lecture stressed that the main strategy for showing these is <strong>reflection</strong>."}
,{deck:"Apr 7 · Abnormality",category:"Evaluation",q:"How were humanistic approaches assessed?",a:"Humanistic approaches gained major traction in the <strong>1960s</strong> and are still used in <strong>self-help groups</strong> and <strong>peer-counseling programs</strong>.<br>They focus on helping people reach their <strong>greatest potential</strong> rather than concentrating on pathology.<br>Main criticisms: they are <strong>vague</strong> and <strong>difficult to test empirically</strong>."}
,{deck:"Apr 7 · Abnormality",category:"Family Systems",q:"How does the family systems approach understand psychopathology?",a:"The family is viewed as a complex <strong>interpersonal system</strong>.<br><strong>Hierarchy</strong> and <strong>rules</strong> shape family-member behavior and can be either <strong>functional</strong> or <strong>dysfunctional</strong>.<br>How psychopathology appears in an individual depends on <strong>family cohesiveness</strong>, <strong>communication style</strong>, and <strong>adaptability to change</strong>."}
,{deck:"Apr 7 · Abnormality",category:"Family Systems",q:"What is Behavioral Family Systems Therapy (BFST), and how was the family systems approach assessed?",a:"<strong>BFST</strong> focuses on <strong>family communication</strong> and <strong>problem solving</strong>, using behavioral and cognitive methods to teach better communication and problem-solving skills.<br><br>The lecture said family systems approaches are particularly useful for <strong>children</strong>, and that families strongly affect members' psychological symptoms."}
,{deck:"Apr 7 · Abnormality",category:"Third-Wave",q:"What is DBT, and what did the lecture emphasize about it?",a:"<strong>DBT</strong> is based on the idea that there is ongoing tension between conflicting thoughts, images, or emotions in people at risk for psychopathology.<br>It focuses on managing <strong>negative emotion</strong> and gaining effortful control over <strong>impulsive behaviors</strong>.<br>The lecture also said DBT has strong <strong>transdiagnostic relevance</strong>."}
,{deck:"Apr 7 · Abnormality",category:"Third-Wave",q:"What is ACT, and what are its main components?",a:"<strong>Acceptance and Commitment Therapy (ACT)</strong>, developed by <strong>Steven Hayes</strong>, assumes that <strong>experiential avoidance</strong> underlies many mental-health problems.<br>Its intervention model combines:<br><strong>Mindfulness and acceptance</strong><br><strong>Behavioral principles</strong><br><strong>Understanding of personal values</strong>"}
,{deck:"Apr 7 · Abnormality",category:"Evaluation",q:"How were third-wave approaches assessed?",a:"The lecture said that the effectiveness of therapies focused on <strong>emotion regulation</strong> suggests these approaches can help with <strong>many mental-health challenges</strong>."}
,{deck:"Apr 7 · Abnormality",category:"Technology",q:"What did the lecture say about telepsychology and service access?",a:"WHO-based research across 17 nations suggested that about <strong>12%-47%</strong> of people have lifetime symptoms that meet criteria for a mental disorder.<br>Mental-health challenges are higher in <strong>disadvantaged ethnic minority groups</strong>, which are also groups with less access to care.<br><strong>Telepsychology</strong> was presented as a way to reduce these <strong>service-access disparities</strong>."}
,{deck:"Apr 7 · Abnormality",category:"Technology",q:"What did the lecture say about telemental health?",a:"The lecture said there is substantial evidence supporting the <strong>acceptability</strong> and <strong>effectiveness</strong> of Internet-delivered treatments.<br>This has been generalized to <strong>children</strong>, <strong>adolescents</strong>, and <strong>adults</strong>.<br>It also noted that telemental health exists in <strong>many different forms</strong>."}
,{deck:"Apr 7 · Abnormality",category:"Sociocultural",q:"How do socioeconomic disadvantage and social upheaval affect mental health risk?",a:"<strong>Socioeconomic disadvantage</strong> was described as a <strong>transdiagnostic risk factor</strong> for many mental-health concerns.<br>The lecture also said that the <strong>upheaval and disintegration of societies</strong> increase risk for mental-health problems."}
,{deck:"Apr 7 · Abnormality",category:"Sociocultural",q:"How do stigma, marginalization, and policy affect mental health?",a:"The lecture said social norms and policies can <strong>stigmatize</strong> and <strong>marginalize</strong> certain groups, increasing their mental-health risk.<br>It gave the example that <strong>LGBTQ individuals</strong> show higher rates of <strong>substance use</strong>, <strong>anxiety</strong>, <strong>depression</strong>, and <strong>suicidality</strong> than heterosexuals."}
,{deck:"Apr 7 · Abnormality",category:"Sociocultural",q:"How did the lecture define culture, and why does it matter for abnormal psychology?",a:"<strong>Culture</strong> was defined as knowledge and meaning passed through generations, with shared <strong>beliefs</strong>, <strong>values</strong>, <strong>behaviors</strong>, and <strong>ways of life</strong>.<br>The lecture stressed that shared cultural beliefs strongly shape how psychological disorders are <strong>understood</strong> and <strong>identified</strong>."}
,{deck:"Apr 7 · Abnormality",category:"Sociocultural",q:"What did the lecture say about social media, echo chambers, and misinformation?",a:"The lecture said people are more likely to accept information that fits their beliefs and to seek friends with similar beliefs.<br><strong>Echo chambers</strong> are like-minded opinion clusters where selective exposure and confirmation bias reduce the exchange of different perspectives.<br>This new age of <strong>misinformation</strong> has major consequences for culture and for how mental illness is understood."}
,{deck:"Apr 7 · Abnormality",category:"Cross-Cultural Treatment",q:"What is multiculturalism in therapy, and what cross-cultural issues were raised?",a:"<strong>Multiculturalism in therapy</strong> means the clinician actively embraces clients' cultural differences while also recognizing how the clinician's <strong>own culture</strong> shapes their perceptions and responses.<br><br>The lecture also raised questions about whether <strong>ethnic matching</strong> and <strong>gender matching</strong> between therapist and client are important."}
,{deck:"Apr 7 · Abnormality",category:"Cross-Cultural Treatment",q:"How can culture affect psychotherapy and culturally specific therapies?",a:"Psychotherapy often emphasizes <strong>emotional expression</strong> and vulnerability, but some cultures value more <strong>restraint</strong> while others value greater emotional expression.<br><br>The lecture also noted culturally specific practices such as <strong>Native American healing processes</strong>, which emphasize physiological, psychological, and religious facets, and that <strong>Native Americans and Hispanics</strong> often seek help from both <strong>folk healers</strong> and mental-health professionals."}
,{deck:"Apr 7 · Abnormality",category:"Evaluation",q:"How were sociocultural approaches assessed?",a:"The sociocultural approach was said to be strong because it highlights larger <strong>social and cultural forces</strong> and does not put all responsibility on the individual.<br>Its main drawback is that it can be <strong>vague</strong> about exactly how social and cultural factors cause psychological disturbances."}
,{deck:"Apr 7 · Abnormality",category:"Prevention",q:"What are primary, secondary, and tertiary prevention?",a:"<strong>Primary prevention</strong>: stopping a disorder from developing in the first place<br><strong>Secondary prevention</strong>: detecting a disorder early through <strong>screening</strong> and intervening before it gets worse<br><strong>Tertiary prevention</strong>: helping people who already have a disorder by preventing <strong>relapse</strong> and reducing its effect on <strong>quality of life</strong>"}
,{deck:"Apr 7 · Abnormality",category:"Prevention",q:"What examples did the prevention pyramid give for primary, secondary, and tertiary prevention?",a:"<strong>Primary</strong>: mental-health awareness and <strong>anti-stigma campaigns</strong><br><strong>Secondary</strong>: screening tools to detect <strong>mild symptoms of depression</strong><br><strong>Tertiary</strong>: <strong>community-based treatment delivery</strong> to reduce symptoms and improve quality of life"}
,{deck:"Apr 7 · Abnormality",category:"Treatment Factors",q:"What common elements of effective treatments were listed?",a:"The lecture listed four common treatment elements:<br><strong>Positive therapeutic relationship</strong> between client and therapist<br><strong>Having an explanation for symptoms</strong><br><strong>Client buy-in</strong> to the treatment approach<br><strong>Confrontation of painful emotions</strong>"}
,{deck:"Apr 7 · Abnormality",category:"Reflection",q:"What was the main point of the final 'To Ponder' slide?",a:"The final slide asked students to identify <strong>maladaptive cognitions and behaviors</strong> in their own lives, propose <strong>five changes</strong> to improve them, and connect those changes back to the <strong>theoretical perspectives</strong> covered in the lecture.<br><br><em>Key idea:</em> apply the theories to real self-change."}
